version: 2

project_name: yappblocker

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz

brews:
  - repository:
      owner: mieubrisse
      name: homebrew-yappblocker
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mieubrisse/yappblocker"
    description: "Kill distracting macOS apps on a schedule"
    license: "MIT"
    install: |
      bin.install "yappblocker"
    test: |
      system "#{bin}/yappblocker", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
