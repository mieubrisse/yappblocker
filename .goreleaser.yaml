version: 2

project_name: yappblocker

before:
  hooks:
    - sh -c "cd src && go mod tidy"

builds:
  - dir: src
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mieubrisse/yappblocker/internal/buildinfo.Version={{.Version}}

archives:
  - format: tar.gz

brews:
  - repository:
      owner: mieubrisse
      name: homebrew-yappblocker
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mieubrisse/yappblocker"
    description: "Kill distracting macOS apps on a schedule"
    license: "MIT"
    install: |
      bin.install "yappblocker"
    caveats: |
      ⚠️  To finish setup, run:

        yappblocker init

      This creates your config file and starts automatic enforcement.
    test: |
      system "#{bin}/yappblocker", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
